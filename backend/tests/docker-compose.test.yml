services:
  postgres-test:
    image: postgres:16
    container_name: elearning-postgres-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: elearning_test_db
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d elearning_test_db"]
      interval: 1s
      timeout: 3s
      retries: 30
