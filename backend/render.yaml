databases:
  - name: elearning-db
    plan: free
    postgresMajorVersion: "16"

services:
  - type: web
    name: elearning-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "pip install uv && uv sync --frozen"
    startCommand: "uv run uvicorn main:app --host 0.0.0.0 --port $PORT"
    preDeployCommand: "uv run python migrate.py"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: elearning-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: none
      - key: ALLOWED_ORIGINS
        value: "http://localhost:3000"
